version: 0.2

phases:
  install:
    commands:
      - nohup /usr/local/bin/dockerd --host=unix:///var/run/docker.sock --host=tcp://127.0.0.1:2375 --storage-driver=overlay2 &
      - timeout 15 sh -c "until docker info; do echo .; sleep 1; done"
  
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 992382773921.dkr.ecr.us-east-1.amazonaws.com
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
  
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build -t gwaipro/gwai-pro-microservices .
      - docker tag gwaipro/gwai-pro-microservices:latest 992382773921.dkr.ecr.us-east-1.amazonaws.com/gwaipro/gwai-pro-microservices:$IMAGE_TAG
  
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing Docker image to Amazon ECR...
      - docker push 992382773921.dkr.ecr.us-east-1.amazonaws.com/gwaipro/gwai-pro-microservices:$IMAGE_TAG
      - printf '[{"name":"gwai-pro-microservices","imageUri":"%s"}]' 992382773921.dkr.ecr.us-east-1.amazonaws.com/gwaipro/gwai-pro-microservices:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json

cache:
  paths:
    - '/root/.docker/cli-plugins'
    - '/root/.npm/**/*'
    - 'dist/**/*'
