version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 992382773921.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - echo Build API Gateway service...
      - cd api-gateway
      - docker build -t gwai-pro/api-gateway .
      - docker tag gwai-pro/api-gateway:latest 992382773921.dkr.ecr.us-east-1.amazonaws.com/gwai-pro/api-gateway:latest
      - cd ..

      - echo Build Users service...
      - cd users-service
      - docker build -t gwai-pro/users-service .
      - docker tag gwai-pro/users-service:latest 992382773921.dkr.ecr.us-east-1.amazonaws.com/gwai-pro/users-service:latest
      - cd ..

      - echo Build Booking service...
      - cd booking-service
      - docker build -t gwai-pro/booking-service .
      - docker tag gwai-pro/booking-service:latest 992382773921.dkr.ecr.us-east-1.amazonaws.com/gwai-pro/booking-service:latest
      - cd ..

      - echo Build Payment service...
      - cd payment-service
      - docker build -t gwai-pro/payment-service .
      - docker tag gwai-pro/payment-service:latest 992382773921.dkr.ecr.us-east-1.amazonaws.com/gwai-pro/payment-service:latest
      - cd ..

  post_build:
    commands:
      - echo Pushing images to Amazon ECR...
      - docker push 992382773921.dkr.ecr.us-east-1.amazonaws.com/gwai-pro/api-gateway:latest
      - docker push 992382773921.dkr.ecr.us-east-1.amazonaws.com/gwai-pro/users-service:latest
      - docker push 992382773921.dkr.ecr.us-east-1.amazonaws.com/gwai-pro/booking-service:latest
      - docker push 992382773921.dkr.ecr.us-east-1.amazonaws.com/gwai-pro/payment-service:latest
