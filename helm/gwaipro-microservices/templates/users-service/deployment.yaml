apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: users-service
  template:
    metadata:
      labels:
        app: users-service
    spec:
      containers:
        - name: users-service
          image: 992382773921.dkr.ecr.us-east-1.amazonaws.com/gwai-pro/users-service:latest
          ports:
            - containerPort: 3003
          env:
            - name: APP_NAME
              value: "users-service"
            - name: POSTGRES_HOST
              value: "users-db"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: users-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: users-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: "users"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: users-secrets
                  key: JWT_SECRET
            - name: JWT_TOKEN_AUDIENCE
              value: "user-service:3003"
            - name: JWT_TOKEN_ISSUER
              value: "user-service:3003"
            - name: JWT_ACCESS_TOKEN_TTL
              value: "3600"
            - name: JWT_REFRESH_TOKEN_TTL
              value: "86400"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: RABBITMQ_URL
              value: "amqp://rabbitmq:5672"
            - name: GOOGLE_CLIENT_ID
              value: "google-client-id"
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: users-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: TWILIO_ACCOUNT_SID
              value: "twilio-account-sid"
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: users-secrets
                  key: TWILIO_AUTH_TOKEN
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 5
