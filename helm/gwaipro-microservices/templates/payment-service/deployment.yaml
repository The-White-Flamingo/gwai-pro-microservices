apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: 992382773921.dkr.ecr.us-east-1.amazonaws.com/gwai-pro/payment-service
          ports:
            - containerPort: 3002
          env:
            - name: RABBITMQ_URL
              value: amqp://rabbitmq:5672
            - name: POSTGRES_HOST
              value: payment-db
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: payment
