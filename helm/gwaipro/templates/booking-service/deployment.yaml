apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: 992382773921.dkr.ecr.us-east-1.amazonaws.com/gwai-pro/booking-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: POSTGRES_HOST
              value: gwaipro.c3iymmo2ikf2.us-east-1.rds.amazonaws.com
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: gwaipro
            - name: POSTGRES_PASSWORD
              value: "###gwaipRO24"
            - name: POSTGRES_DB
              value: bookings
            - name: RABBITMQ_URL
              value: amqp://rabbitmq:rabbitmq@gwaipro-rabbitmq:5672
      imagePullSecrets:
        - name: ecr-reg