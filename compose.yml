services:
  api-gateway:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        - APP_NAME=api-gateway
    ports:
      - 3000:3000
    environment:
      - NODE_ENV=development
      - JWT_TOKEN=XcJwVOuNBIngYy06oNgfjBmtVnD3trLw
      - JWT_TOKEN_AUDIENCE=user-service:3003
      - JWT_TOKEN_ISSUER=user-service:3003
      - JWT_ACCESS_TOKEN_TTL=3600
      - JWT_REFRESH_TOKEN_TTL=86400
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - rabbitmq
      - users-service
      - booking-service
      - payment-service
    command: yarn start:dev api-gateway

  booking-service:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        - APP_NAME=booking-service
    ports:
      - 3001:3001
    environment:
      - NODE_ENV=development
      - POSTGRES_HOST=bookings-db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bookings
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - bookings-db
      - rabbitmq
    command: yarn start:dev booking-service

  payment-service:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        - APP_NAME=payment-service
    ports:
      - 3002:3002
    environment:
      - NODE_ENV=development
      - POSTGRES_HOST=payments-db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=payments
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - payments-db
      - rabbitmq
    command: yarn start:dev payment-service

  users-service:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        - APP_NAME=users-service
    ports:
      - 3003:3003
    environment:
      - NODE_ENV=development
      - POSTGRES_HOST=users-db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=users
      - JWT_SECRET=XcJwVOuNBIngYy06oNgfjBmtVnD3trLw
      - JWT_TOKEN_AUDIENCE=user-service:3003
      - JWT_TOKEN_ISSUER=user-service:3003
      - JWT_ACCESS_TOKEN_TTL=3600
      - JWT_REFRESH_TOKEN_TTL=86400
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - GOOGLE_CLIENT_ID=google-client-id
      - GOOGLE_CLIENT_SECRET=google-client-secret
      - TWILIO_ACCOUNT_SID=twilio-account-sid
      - TWILIO_AUTH_TOKEN=twilio-auth-token
    depends_on:
      - users-db
      - redis
      - rabbitmq
    command: yarn start:dev users-service

  bookings-db:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bookings
      - POSTGRES_HOST_AUTH_METHOD=trust

  payments-db:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=payments
      - POSTGRES_HOST_AUTH_METHOD=trust

  users-db:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=users
      - POSTGRES_HOST_AUTH_METHOD=trust     

  redis:
    image: redis:alpine

  rabbitmq:
    image: rabbitmq:alpine
