services:
  api-gateway:
    build:
      context: .
      dockerfile: ./apps/api-gateway/Dockerfile
      target: development
      args:
        - APP_NAME=api-gateway
    ports:
      - 3000:3000
    env_file:
      - ./apps/api-gateway/.env
    environment:
      # Override for Docker network
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672?frameMax=0
    volumes:        
      - ./libs:/usr/src/app/libs
      - ./package.json:/usr/src/app/package.json
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      - ./node_modules:/usr/src/app/node_modules
      - ./apps/api-gateway:/usr/src/app/apps/api-gateway
    depends_on:
      - rabbitmq
      - users-service
      - booking-service
      - payment-service
      - posts-service
    command: yarn start:dev api-gateway

  booking-service:
    build:
      context: .
      dockerfile: ./apps/booking-service/Dockerfile
      target: development
      args:
        - APP_NAME=booking-service
    env_file:
      - ./apps/booking-service/.env
    environment:
      # Override for Docker network
      - POSTGRES_HOST=bookings-db
      - POSTGRES_PORT=5432
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672?frameMax=0
    volumes:        
      - ./libs:/usr/src/app/libs
      - ./package.json:/usr/src/app/package.json
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      - ./node_modules:/usr/src/app/node_modules
      - ./apps/booking-service:/usr/src/app/apps/booking-service
    depends_on:
      - bookings-db
      - rabbitmq
    command: yarn start:dev booking-service

  payment-service:
    build:
      context: .
      dockerfile: ./apps/payment-service/Dockerfile
      target: development
      args:
        - APP_NAME=payment-service

    env_file:
      - ./apps/payment-service/.env
    environment:
      # Override for Docker network
      - POSTGRES_HOST=payments-db
      - POSTGRES_PORT=5432
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672?frameMax=0
    volumes:        
      - ./libs:/usr/src/app/libs
      - ./package.json:/usr/src/app/package.json
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      - ./node_modules:/usr/src/app/node_modules
      - ./apps/payment-service:/usr/src/app/apps/payment-service
    depends_on:
      - payments-db
      - rabbitmq
    command: yarn start:dev payment-service

  users-service:
    build:
      context: .
      dockerfile: ./apps/users-service/Dockerfile
      target: development
      args:
        - APP_NAME=users-service
    env_file:
      - ./apps/users-service/.env
    environment:
      # Override for Docker network
      - POSTGRES_HOST=users-db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672?frameMax=0
    volumes:        
      - ./libs:/usr/src/app/libs
      - ./package.json:/usr/src/app/package.json
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      - ./node_modules:/usr/src/app/node_modules
      - ./apps/users-service:/usr/src/app/apps/users-service
    depends_on:
      - users-db
      - redis
      - rabbitmq
    command: yarn start:dev users-service

  chat-service:
    build:
      context: .
      dockerfile: ./apps/chat-service/Dockerfile
      target: development
      args:
        - APP_NAME=chat-service
    env_file:
      - ./apps/chat-service/.env
    environment:
      # Override for Docker network
      - POSTGRES_HOST=chat-db
      - POSTGRES_PORT=5432
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672?frameMax=0
    volumes:        
      - ./libs:/usr/src/app/libs
      - ./package.json:/usr/src/app/package.json
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      - ./node_modules:/usr/src/app/node_modules
      - ./apps/chat-service:/usr/src/app/apps/chat-service
    depends_on:
      - chat-db
      - rabbitmq
    command: yarn start:dev chat-service

  waitlist-service:
    build:
      context: .
      dockerfile: ./apps/waitlist-service/Dockerfile
      target: development
      args:
        - APP_NAME=waitlist-service
    env_file:
      - ./apps/waitlist-service/.env
    environment:
      # Override for Docker network
      - POSTGRES_HOST=waitlist-db
      - POSTGRES_PORT=5432
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672?frameMax=0
    volumes:        
      - ./libs:/usr/src/app/libs
      - ./package.json:/usr/src/app/package.json
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      - ./node_modules:/usr/src/app/node_modules
      - ./apps/waitlist-service:/usr/src/app/apps/waitlist-service
    depends_on:
      - waitlist-db
      - rabbitmq
    command: yarn start:dev waitlist-service

  mailing-service:
    build:
      context: .
      dockerfile: ./apps/mailing-service/Dockerfile
      target: development
      args:
        - APP_NAME=mailing-service
    env_file:
      - ./apps/mailing-service/.env
    environment:
      # Override for Docker network
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672?frameMax=0
    volumes:
      - ./libs:/usr/src/app/libs
      - ./package.json:/usr/src/app/package.json
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      - ./node_modules:/usr/src/app/node_modules
      - ./apps/mailing-service:/usr/src/app/apps/mailing-service
    depends_on:
      - rabbitmq
    command: yarn start:dev mailing-service

  posts-service:
    build:
      context: .
      dockerfile: ./apps/posts-service/Dockerfile
      target: development
      args:
        - APP_NAME=posts-service
    env_file:
      - ./apps/posts-service/.env
    environment:
      # Override for Docker network
      - POSTGRES_HOST=posts-db
      - POSTGRES_PORT=5432
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672?frameMax=0
    volumes:
      - ./libs:/usr/src/app/libs
      - ./package.json:/usr/src/app/package.json
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      - ./node_modules:/usr/src/app/node_modules
      - ./apps/posts-service:/usr/src/app/apps/posts-service
    depends_on:
      - posts-db
      - rabbitmq
    command: yarn start:dev posts-service

  # Database Services
  bookings-db:
    image: postgres:alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bookings
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - bookings_data:/var/lib/postgresql/data

  payments-db:
    image: postgres:alpine
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=payments
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - payments_data:/var/lib/postgresql/data

  users-db:
    image: postgres:alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=users
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - users_data:/var/lib/postgresql/data
  
  chat-db:
    image: postgres:alpine
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=chats
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - chat_data:/var/lib/postgresql/data

  posts-db:
    image: postgres:alpine
    ports:
      - "5436:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=posts
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - posts_data:/var/lib/postgresql/data
    
  waitlist-db:
    image: postgres:alpine
    ports:
      - "5437:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=waitlist
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - waitlist_data:/var/lib/postgresql/data

  # Infrastructure Services
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:management-alpine
    ports:
      - 5675:5672
      - 15672:15672
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

# Persistent volumes for data
volumes:
  bookings_data:
  payments_data:
  users_data:
  chat_data:
  posts_data:
  waitlist_data:
  redis_data:
  rabbitmq_data:
