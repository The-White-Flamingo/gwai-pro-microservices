
services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "15672:15672"   # RabbitMQ dashboard (optional)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped

  users-db:
    image: postgres:15-alpine
    container_name: users-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users
    volumes:
      - users_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  bookings-db:
    image: postgres:15-alpine
    container_name: bookings-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookings
    volumes:
      - bookings_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  payments-db:
    image: postgres:15-alpine
    container_name: payments-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments
    volumes:
      - payments_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  posts-db:
    image: postgres:15-alpine
    container_name: posts-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: posts
    volumes:
      - posts_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  blog-db:
    image: postgres:15-alpine
    container_name: blog-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blog
    volumes:
      - blog_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  chat-db:
    image: postgres:15-alpine
    container_name: chat-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chats
    volumes:
      - chat_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  waitlist-db:
    image: postgres:15-alpine
    container_name: waitlist-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: waitlist
    volumes:
      - waitlist_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: ./apps/api-gateway/Dockerfile
      target: development
    container_name: api-gateway
    env_file:
      - ./apps/api-gateway/.env
    ports:
      - "3000:3000"
    depends_on:
      - rabbitmq
      - blog-service
    restart: unless-stopped

  users-service:
    build:
      context: .
      dockerfile: ./apps/users-service/Dockerfile
      target: development
    container_name: users-service
    env_file:
      - ./apps/users-service/.env
    depends_on:
      - users-db
      - redis
      - rabbitmq
      - sms-service
    restart: unless-stopped

  booking-service:
    build:
      context: .
      dockerfile: ./apps/booking-service/Dockerfile
      target: development
    container_name: booking-service
    env_file:
      - ./apps/booking-service/.env
    depends_on:
      - bookings-db
      - rabbitmq
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: ./apps/payment-service/Dockerfile
      target: development
    container_name: payment-service
    env_file:
      - ./apps/payment-service/.env
    depends_on:
      - payments-db
      - rabbitmq
    restart: unless-stopped

  posts-service:
    build:
      context: .
      dockerfile: ./apps/posts-service/Dockerfile
      target: development
    container_name: posts-service
    env_file:
      - ./apps/posts-service/.env
    depends_on:
      - posts-db
      - rabbitmq
    restart: unless-stopped

  blog-service:
    build:
      context: .
      dockerfile: ./apps/blog-service/Dockerfile
      target: development
    container_name: blog-service
    env_file:
      - ./apps/blog-service/.env
    environment:
      - POSTGRES_HOST=blog-db
      - POSTGRES_PORT=5432
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672?frameMax=0
    depends_on:
      - blog-db
      - rabbitmq
    restart: unless-stopped

  chat-service:
    build:
      context: .
      dockerfile: ./apps/chat-service/Dockerfile
      target: development
    container_name: chat-service
    env_file:
      - ./apps/chat-service/.env
    depends_on:
      - chat-db
      - rabbitmq
    restart: unless-stopped

  mailing-service:
    build:
      context: .
      dockerfile: ./apps/mailing-service/Dockerfile
      target: development
    container_name: mailing-service
    env_file:
      - ./apps/mailing-service/.env
    depends_on:
      - rabbitmq
    restart: unless-stopped

  sms-service:
    build:
      context: .
      dockerfile: ./apps/sms-service/Dockerfile
      target: development
    container_name: sms-service
    env_file:
      - ./apps/sms-service/.env
    depends_on:
      - rabbitmq
    restart: unless-stopped

  waitlist-service:
    build:
      context: .
      dockerfile: ./apps/waitlist-service/Dockerfile
      target: development
    container_name: waitlist-service
    env_file:
      - ./apps/waitlist-service/.env
    depends_on:
      - waitlist-db
      - rabbitmq
    restart: unless-stopped

volumes:
  users_db_data:
  bookings_db_data:
  payments_db_data:
  posts_db_data:
  blog_db_data:
  chat_db_data:
  waitlist_db_data:

