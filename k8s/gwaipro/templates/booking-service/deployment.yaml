# booking-service-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
      - name: booking-service
        image: 992382773921.dkr.ecr.us-east-1.amazonaws.com/gwai-pro/booking-service:latest
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
        - name: POSTGRES_HOST
          value: "bookings-db.default.svc.cluster.local"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_USER
          value: "gwaipro"
        - name: POSTGRES_PASSWORD
          value: "pass123"
        - name: POSTGRES_DB
          value: "bookings"
        - name: RABBITMQ_URL
          value: "amqp://gwaipro:pass123@rabbitmq.default.svc.cluster.local:5672"
