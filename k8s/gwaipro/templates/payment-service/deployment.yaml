# payment-service-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: 992382773921.dkr.ecr.us-east-1.amazonaws.com/gwai-pro/payment-service:latest
        ports:
        - containerPort: 3002
        env:
        - name: NODE_ENV
          value: "production"
        - name: POSTGRES_HOST
          value: "gwaipro.c3iymmo2ikf2.us-east-1.rds.amazonaws.com"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_USER
          value: "gwaipro"
        - name: POSTGRES_PASSWORD
          value: "###gwaipRO24"
        - name: POSTGRES_DB
          value: "payments"
        - name: RABBITMQ_URL
          value: "amqp://gwaipro:pass123@rabbitmq.default.svc.cluster.local:5672"
